# 26.03.12

[versions]
molecule = "2.2.0" # https://github.com/cashapp/molecule
filekit = "0.13.0" # https://github.com/vinceglb/FileKit
# Media
landscapist = "2.9.5" # https://github.com/skydoves/landscapist
coil = "3.4.0" # https://github.com/coil-kt/coil
krop = "0.3.0-alpha01" # https://github.com/tamimattafi/krop
composeMediaPlayer = "0.8.7" # https://github.com/kdroidFilter/ComposeMediaPlayer
# UI
materialkolor = "5.0.0-alpha07" # https://github.com/jordond/MaterialKolor
colorpicker = "1.1.3" # https://github.com/skydoves/colorpicker-compose
cloudy = "0.5.0" # https://github.com/skydoves/Cloudy
haze = "1.7.2" # https://github.com/chrisbanes/haze
composeIcons = "1.1.1" # https://github.com/DevSrSouza/compose-icons
# Check
cite = "0.8.0" # https://github.com/JakeWharton/cite
zipline = "1.26.0" # https://github.com/cashapp/zipline
metro = "0.11.2" # https://github.com/ZacSweers/metro
# Test
turbine = "1.2.1" # https://github.com/cashapp/turbine
paparazzi = "2.0.0-alpha04" # https://github.com/cashapp/paparazzi

[libraries]
molecule = { group = "app.cash.molecule", name = "molecule-runtime", version.ref = "molecule" }
filekit-core = { group = "io.github.vinceglb", name = "filekit-core", version.ref = "filekit" }
filekit-dialogs-compose = { group = "io.github.vinceglb", name = "filekit-dialogs-compose", version.ref = "filekit" }
filekit-coil = { module = "io.github.vinceglb:filekit-coil", version.ref = "filekit" }
landscapist-core = { group = "com.github.skydoves", name = "landscapist-core", version.ref = "landscapist" }
landscapist-coil = { group = "com.github.skydoves", name = "landscapist-coil", version.ref = "landscapist" }
landscapist-animation = { group = "com.github.skydoves", name = "landscapist-animation", version.ref = "landscapist" }
landscapist-placeholder = { group = "com.github.skydoves", name = "landscapist-placeholder", version.ref = "landscapist" }
landscapist-palette = { group = "com.github.skydoves", name = "landscapist-palette", version.ref = "landscapist" }
landscapist-transformation = { group = "com.github.skydoves", name = "landscapist-transformation", version.ref = "landscapist" }
landscapist-zoomable = { group = "com.github.skydoves", name = "landscapist-zoomable", version.ref = "landscapist" }
krop-core = { group = "com.attafitamim.krop", name = "core", version.ref = "krop" }
krop-ui = { group = "com.attafitamim.krop", name = "ui", version.ref = "krop" }
krop-filekit = { group = "com.attafitamim.krop", name = "extensions-filekit", version.ref = "krop" }
composeMediaPlayer = { group = "io.github.kdroidfilter", name = "composemediaplayer", version.ref = "composeMediaPlayer" }
materialkolor = { group = "com.materialkolor", name = "material-kolor", version.ref = "materialkolor" }
colorpicker = { group = "com.github.skydoves", name = "colorpicker-compose", version.ref = "colorpicker" }
cloudy = { group = "com.github.skydoves", name = "cloudy", version.ref = "cloudy" }
haze = { group = "dev.chrisbanes.haze", name = "haze", version.ref = "haze" }
haze-materials = { group = "dev.chrisbanes.haze", name = "haze-materials", version.ref = "haze" }
composeIcons-cssGg = { group = "br.com.devsrsouza.compose.icons", name = "css-gg", version.ref = "composeIcons" }
composeIcons-weatherIcons = { group = "br.com.devsrsouza.compose.icons", name = "erikflowers-weather-icons", version.ref = "composeIcons" }
composeIcons-evaIcons = { group = "br.com.devsrsouza.compose.icons", name = "eva-icons", version.ref = "composeIcons" }
composeIcons-feather = { group = "br.com.devsrsouza.compose.icons", name = "feather", version.ref = "composeIcons" }
composeIcons-fontAwesome = { group = "br.com.devsrsouza.compose.icons", name = "font-awesome", version.ref = "composeIcons" }
composeIcons-lineAwesome = { group = "br.com.devsrsouza.compose.icons", name = "line-awesome", version.ref = "composeIcons" }
composeIcons-linea = { group = "br.com.devsrsouza.compose.icons", name = "linea", version.ref = "composeIcons" }
composeIcons-octicons = { group = "br.com.devsrsouza.compose.icons", name = "octicons", version.ref = "composeIcons" }
composeIcons-simpleIcons = { group = "br.com.devsrsouza.compose.icons", name = "simple-icons", version.ref = "composeIcons" }
composeIcons-tablerIcons = { group = "br.com.devsrsouza.compose.icons", name = "tabler-icons", version.ref = "composeIcons" }


[bundles]
filekit = ["filekit-core", "filekit-dialogs-compose"]
landscapist = [
    "landscapist-core",
    "landscapist-animation",
    "landscapist-placeholder",
    "landscapist-palette",
    "landscapist-transformation",
    "landscapist-zoomable",
]
krop = ["krop-core", "krop-ui", "krop-filekit"]
ui = ["materialkolor", "colorpicker"]
renderEffect = ["cloudy", "haze", "haze-materials"]
composeIcons = [
    "composeIcons-cssGg",
    "composeIcons-weatherIcons",
    "composeIcons-evaIcons",
    "composeIcons-feather",
    "composeIcons-fontAwesome",
    "composeIcons-lineAwesome",
    "composeIcons-linea",
    "composeIcons-octicons",
    "composeIcons-simpleIcons",
    "composeIcons-tablerIcons",
]


[plugins]

